<h2 class="mb-2 text-xl font-medium">Global Token Overview</h2>
@if (tokens()) {
  <div class="flex flex-wrap gap-2">
    @for (token of tokens()!; track token) {
      <app-token-card
        (tokenDeleted)="loadTokens()"
        [token]="token"
      ></app-token-card>
    } @empty {
      No tokens created yet.
    }
  </div>
} @else {
  TODO skeleton loader here
}
